# Prometheus Config - Phase 1.1.3 Observability
# Deterministic metrics collection

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    phase: '1.1'
    component: 'cic-observability'

# Alerting rules
rule_files:
  - '/etc/prometheus/alerts.yml'

scrape_configs:
  # CIC Main App
  - job_name: 'cic-wil'
    static_configs:
      - targets: ['cic-wil:8080']
    metrics_path: '/metrics'

  # Governance Engine
  - job_name: 'governance-engine'
    static_configs:
      - targets: ['governance-engine:9095']
    metrics_path: '/metrics'

  # Memory Store (PostgreSQL)
  - job_name: 'memory-store'
    static_configs:
      - targets: ['memory-store:5432']

  # Prometheus self
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Grafana Datasources - Phase 1.1.3 Observability

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker logs
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*log.json
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs: attrs
      - output:
          source: output

  # CIC WIL application logs
  - job_name: cic-wil
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [ __meta_docker_container_name ]
        regex: 'cic-wil.*'
        action: keep
      - source_labels: [ __meta_docker_container_name ]
        target_label: container
      - source_labels: [ __meta_docker_container_log_stream ]
        target_label: stream
    pipeline_stages:
      - json:
          expressions:
            message: message
            level: level
            timestamp: timestamp
      - output:
          source: message

  # Kubernetes logs (if running on k3d)
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [ __meta_kubernetes_pod_name ]
        target_label: pod
      - source_labels: [ __meta_kubernetes_namespace ]
        target_label: namespace
      - source_labels: [ __meta_kubernetes_pod_label_app ]
        target_label: app

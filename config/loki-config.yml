# Loki Config - Phase 1.1.3 Observability
# Log aggregation and retention

auth_enabled: false

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  max_chunk_age: 2h
  chunk_idle_period: 5m

limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h

schema_config:
  configs:
    - from: 2026-06-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

storage_config:
  filesystem:
    directory: /loki/chunks
  index_cache_validity: 5m

chunk_store_config:
  max_look_back_period: 0s

retention_config:
  enabled: true
  default_days_retention: 30

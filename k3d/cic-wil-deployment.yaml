apiVersion: v1
kind: Namespace
metadata:
  name: cic

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cic-wil
  namespace: cic
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cic-wil
      tier: backend
  template:
    metadata:
      labels:
        app: cic-wil
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: cic-wil
          image: cic-wil:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: MLA_DATA_PATH
              value: "/data/cic/mla"
          volumeMounts:
            - name: cic-data
              mountPath: /data/cic
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: cic-data
          hostPath:
            path: /data/cic
            type: DirectoryOrCreate
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: cic-wil-svc
  namespace: cic
  labels:
    app: cic-wil
spec:
  type: LoadBalancer
  selector:
    app: cic-wil
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cic-config
  namespace: cic
data:
  mla-path: /data/cic/mla
  node-env: production

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cic-wil-hpa
  namespace: cic
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cic-wil
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

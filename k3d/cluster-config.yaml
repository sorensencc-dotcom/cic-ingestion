apiVersion: k3d.io/v1alpha4
kind: Simple
metadata:
  name: cic-local
servers: 1
agents: 2

# Port mappings (host:container)
ports:
  - port: 8080:8080
    nodeFilters:
      - loadbalancer
  - port: 5432:5432
    nodeFilters:
      - loadbalancer
  - port: 3000:3000
    nodeFilters:
      - loadbalancer
  - port: 3001:3001
    nodeFilters:
      - loadbalancer
  - port: 9090:9090
    nodeFilters:
      - loadbalancer

# Built-in local registry
registries:
  create:
    name: k3d-registry
    host: 0.0.0.0
    hostPort: "5001"

# Volume mounts
volumes:
  # CIC data
  - volume: $PWD/data/cic:/data/cic
    nodeFilters:
      - "all"
  # Postgres data
  - volume: $PWD/data/postgres:/var/lib/postgresql/data
    nodeFilters:
      - "all"
  # Prometheus data
  - volume: $PWD/data/prometheus:/prometheus
    nodeFilters:
      - "all"
  # Loki data
  - volume: $PWD/data/loki:/loki
    nodeFilters:
      - "all"

# Environment variables
env:
  - key: NODE_ENV
    value: production
  - key: MLA_DATA_PATH
    value: /data/cic/mla

# Options
options:
  k3d:
    wait: true
    timeout: 60s
    disableLoadbalancer: false

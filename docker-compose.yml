version: '3.9'

# Phase 1.1 Docker Compose: TheFoundry Multi-Service Stack
# Deterministic Node build + Governance + Observability
# All services sealed and reproducible

services:
  # ===== Main Application =====
  cic-wil:
    build:
      context: .
      dockerfile: thefoundry/images/node-build/Dockerfile
    container_name: cic-wil
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      MEMORY_STORE_HOST: memory-store
      MEMORY_STORE_PORT: 5432
      MEMORY_STORE_DB: cic
      MEMORY_STORE_USER: cic
      MEMORY_STORE_PASSWORD: cic-local
      GOVERNANCE_ENGINE: "true"
      AUTONOMY_ENABLED: "true"
      OBSERVABILITY_ENABLED: "true"
    depends_on:
      memory-store:
        condition: service_healthy
      governance-engine:
        condition: service_started
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    networks:
      - cic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===== Memory Store (PostgreSQL) =====
  memory-store:
    image: postgres:16.3-alpine3.20
    container_name: memory-store
    restart: unless-stopped
    environment:
      POSTGRES_DB: cic
      POSTGRES_USER: cic
      POSTGRES_PASSWORD: cic-local
    ports:
      - "5432:5432"
    volumes:
      - memory-store-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cic -d cic"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Phase 1.1.1: Governance Engine =====
  governance-engine:
    build:
      context: .
      dockerfile: Dockerfile.governance
    container_name: governance-engine
    restart: unless-stopped
    environment:
      NODE_ENV: development
      GOVERNANCE_PORT: 9095
      POLICY_DIR: /app/config/policies
      AUDIT_LOG_PATH: /app/data/audit.log
    ports:
      - "9095:9095"
    volumes:
      - ./config/policies:/app/config/policies:ro
      - ./data:/app/data
    networks:
      - cic-network
    depends_on:
      - memory-store

  # ===== Phase 1.1.3: Observability Stack =====
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - cic-network

  loki:
    image: grafana/loki:3.1.0
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - cic-network

  promtail:
    image: grafana/promtail:3.1.0
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - cic-network
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: cic-local
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - ./dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    networks:
      - cic-network
    depends_on:
      - prometheus
      - loki

# ===== Volumes =====
volumes:
  memory-store-data:
  prometheus-data:
  loki-data:
  grafana-data:

# ===== Networks =====
networks:
  cic-network:
    driver: bridge
